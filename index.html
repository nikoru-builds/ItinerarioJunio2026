<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La Subasta de un Alma — El Drama</title>

<!-- Leaflet (CDN) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --page:    #F0EFEC;
    --panel:   #FFFFFF;
    --ink:     #141414;
    --muted:   #6E6E73;
    --line:    #E7E4DF;
    --line-2:  #D7D3CD;
    --signal:  #E11D26;
    --gold:    #F2A900;
    --display: "Space Grotesk", system-ui, sans-serif;
    --body:    system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    --radius:  10px;
    --shadow:  0 1px 2px rgba(20,20,20,.06), 0 8px 24px rgba(20,20,20,.07);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--body);
    color: var(--ink);
    background: var(--page);
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: .001ms !important; transition-duration: .001ms !important; }
  }

  /* ---------- Layout shell ---------- */
  .app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  .topbar {
    position: relative;
    display: flex; align-items: center; justify-content: center; gap: 14px;
    padding: 12px 18px;
    background: #000; color: #fff;
    border-bottom: 3px solid var(--gold);
    flex-wrap: wrap;
  }
  .logo-block { display: flex; flex-direction: column; align-items: center; gap: 7px; min-width: 0; }
  .logo { height: 62px; width: auto; max-width: 100%; display: block; }
  .logo-caption {
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    letter-spacing: .3em; text-transform: uppercase; color: var(--gold);
    text-align: center; padding-left: .3em;
  }

  .topbar-actions { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    font-size: 13px; font-weight: 500; border-radius: 8px; padding: 8px 13px;
    border: 1px solid rgba(255,255,255,.22); background: rgba(255,255,255,.06); color: #fff;
    transition: background .15s ease, transform .05s ease;
  }
  .btn:hover { background: rgba(255,255,255,.16); }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--signal); border-color: var(--signal); font-weight: 600; }
  .btn.primary:hover { background: #b71820; }
  /* Importar / Exportar: quiet, secondary — they save & reload your itinerary file */
  .btn.quiet { border-color: transparent; background: transparent; color: rgba(255,255,255,.62); padding: 8px 10px; }
  .btn.quiet:hover { color: #fff; background: rgba(255,255,255,.10); }

  .body { display: flex; flex: 1; min-height: 0; }

  /* ---------- Rail (the transit line) ---------- */
  .rail {
    width: 380px; flex-shrink: 0; background: var(--panel);
    border-right: 1px solid var(--line); overflow-y: auto; padding: 18px 0 60px;
  }
  .rail-empty { padding: 40px 24px; color: var(--muted); text-align: center; font-size: 14px; line-height: 1.5; }

  .day { position: relative; padding: 0 18px; }
  .day-head {
    display: flex; align-items: center; gap: 10px;
    padding: 16px 0 10px; position: relative;
  }
  .day-dot {
    width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
    border: 3px solid var(--panel); box-shadow: 0 0 0 2px currentColor;
  }
  .day-meta { flex: 1; min-width: 0; }
  .day-label {
    font-family: var(--display); font-weight: 600; font-size: 15px; line-height: 1.1;
    border: 0; background: transparent; color: var(--ink); width: 100%; padding: 2px 4px; border-radius: 5px;
  }
  .day-date { font-family: var(--mono); font-size: 11px; color: var(--muted); padding: 0 4px; }
  .day-info {
    margin: 2px 0 12px 26px; font-size: 12.5px; line-height: 1.5; color: var(--ink);
    background: #FBF6E9; border: 1px solid #EEE1BE; border-left: 3px solid var(--gold);
    border-radius: 9px; padding: 9px 12px;
  }
  .day-info-tag {
    display: inline-block; font-family: var(--mono); font-size: 9.5px; font-weight: 600;
    letter-spacing: .14em; text-transform: uppercase; color: #9A7A12; margin-right: 6px;
  }
  .day-info-list { margin: 6px 0 0; padding-left: 18px; }
  .day-info-list li { margin: 3px 0; }
  .day-info-list li::marker { color: var(--gold); }
  .day-tools { display: flex; gap: 4px; opacity: 0; transition: opacity .12s; }
  .day:hover .day-tools, .day-tools:focus-within { opacity: 1; }
  .icon-btn {
    border: 0; background: transparent; color: var(--muted); padding: 4px;
    border-radius: 6px; line-height: 0; font-size: 14px;
  }
  .icon-btn:hover { background: var(--line); color: var(--ink); }

  /* stops list with connecting line */
  .stops { position: relative; margin-left: 7px; padding-left: 22px; }
  .stops::before {
    content: ""; position: absolute; left: 0; top: -4px; bottom: 10px;
    width: 3px; border-radius: 3px; background: currentColor; opacity: .35;
  }
  .stop {
    position: relative; padding: 9px 10px 9px 12px; margin: 4px 0;
    border: 1px solid transparent; border-radius: 9px; cursor: pointer;
    transition: background .12s, border-color .12s;
  }
  .stop:hover { background: var(--page); }
  .stop.active { background: #fff; border-color: var(--line-2); box-shadow: var(--shadow); }
  .stop-node {
    position: absolute; left: -22px; top: 12px;
    width: 22px; height: 22px; border-radius: 50%;
    display: grid; place-items: center; transform: translateX(-9px);
    background: currentColor; color: var(--day-c, var(--signal));
    font-family: var(--mono); font-size: 11px; font-weight: 600;
  }
  .stop-node span { color: #fff; }
  .stop-top { display: flex; align-items: baseline; gap: 8px; }
  .stop-time { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .stop-name { font-weight: 500; font-size: 14px; color: var(--ink); }
  .stop-notes { font-size: 12px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .stop-coord { font-family: var(--mono); font-size: 10px; color: var(--line-2); margin-top: 4px; }
  .stop-dir {
    display: inline-flex; align-items: center; gap: 4px; margin-top: 7px;
    font-size: 12px; font-weight: 600; color: var(--signal); text-decoration: none;
    border: 1px solid var(--line-2); border-radius: 7px; padding: 4px 9px; background: #fff;
  }
  .stop-dir:hover { border-color: var(--signal); background: #fff5f5; }
  .leaflet-popup-content .popup-dir {
    display: inline-flex; align-items: center; gap: 4px; margin-top: 8px;
    font-family: var(--body); font-size: 12.5px; font-weight: 700;
    color: var(--signal); text-decoration: none;
  }
  .leaflet-popup-content .popup-dir:hover { text-decoration: underline; }
  .stop-tools { position: absolute; right: 6px; top: 6px; display: flex; gap: 2px; opacity: 0; transition: opacity .12s; }
  .stop:hover .stop-tools { opacity: 1; }

  .add-stop {
    margin: 6px 0 4px 29px; font-size: 12.5px; color: var(--muted);
    background: transparent; border: 1px dashed var(--line-2); border-radius: 8px;
    padding: 7px 10px; width: calc(100% - 29px); text-align: left;
  }
  .add-stop:hover { color: var(--ink); border-color: var(--ink); }

  .rail-foot { padding: 18px 18px 0; }
  .add-day {
    width: 100%; padding: 11px; border-radius: 9px; border: 1px solid var(--line-2);
    background: var(--page); color: var(--ink); font-weight: 500; font-size: 13.5px;
  }
  .add-day:hover { background: #fff; box-shadow: var(--shadow); }

  /* ---------- Map ---------- */
  .map-wrap { flex: 1; position: relative; min-width: 0; }
  #map { position: absolute; inset: 0; background: #dfe3e8; }
  .map-overlay {
    position: absolute; z-index: 500; top: 12px; right: 12px;
    display: flex; gap: 8px;
  }
  .map-overlay .btn {
    background: #fff; color: var(--ink); border: 1px solid var(--line-2);
    box-shadow: var(--shadow);
  }
  .map-overlay .btn:hover { background: var(--page); }

  /* leaflet marker pin */
  .pin {
    width: 28px; height: 28px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg); display: grid; place-items: center;
    box-shadow: 0 2px 6px rgba(0,0,0,.4); border: 2px solid #fff;
  }
  .pin span { transform: rotate(45deg); color: #fff; font-family: var(--mono); font-weight: 600; font-size: 12px; }

  /* ---------- Mobile toggle ---------- */
  .view-toggle { display: none; }
  @media (max-width: 760px) {
    .body { position: relative; }
    .rail { position: absolute; inset: 0; width: 100%; z-index: 10; border-right: 0; }
    .map-wrap { position: absolute; inset: 0; }
    body[data-view="map"] .rail { display: none; }
    body[data-view="list"] .map-wrap { display: none; }
    .view-toggle {
      display: flex; position: fixed; z-index: 1000; bottom: 16px; left: 50%;
      transform: translateX(-50%); background: var(--ink); border-radius: 999px;
      padding: 4px; box-shadow: var(--shadow);
    }
    .view-toggle button {
      border: 0; background: transparent; color: rgba(255,255,255,.7);
      font-weight: 600; font-size: 13px; padding: 8px 20px; border-radius: 999px;
    }
    .view-toggle button.on { background: var(--signal); color: #fff; }
    .topbar { flex-direction: column; }
    .topbar-actions { position: static; transform: none; right: auto; top: auto; }
    .logo { height: 44px; }
  }

  /* ---------- Modal ---------- */
  .scrim {
    position: fixed; inset: 0; background: rgba(20,24,31,.45); z-index: 2000;
    display: none; align-items: flex-start; justify-content: center; padding: 6vh 16px;
    backdrop-filter: blur(2px);
  }
  .scrim.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; width: 100%; max-width: 440px;
    box-shadow: 0 24px 60px rgba(0,0,0,.3); overflow: hidden;
    animation: pop .18s ease;
  }
  @keyframes pop { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid var(--line);
  }
  .modal-head h2 { margin: 0; font-family: var(--display); font-size: 17px; font-weight: 600; }
  .modal-body { padding: 16px 18px; display: grid; gap: 13px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; letter-spacing: .02em; }
  .field input, .field textarea {
    width: 100%; padding: 9px 11px; border: 1px solid var(--line-2); border-radius: 8px;
    font-family: var(--body); font-size: 14px; color: var(--ink); background: #fff;
  }
  .field input:focus, .field textarea:focus { outline: 2px solid var(--signal); border-color: var(--signal); }
  .field textarea { resize: vertical; min-height: 56px; }
  .row { display: flex; gap: 10px; }
  .row .field { flex: 1; }
  .mono-in { font-family: var(--mono); }

  .search-box { position: relative; }
  .search-results {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 5;
    background: #fff; border: 1px solid var(--line-2); border-radius: 8px;
    box-shadow: var(--shadow); max-height: 200px; overflow-y: auto; display: none;
  }
  .search-results.show { display: block; }
  .search-results button {
    display: block; width: 100%; text-align: left; border: 0; background: #fff;
    padding: 9px 11px; font-size: 13px; color: var(--ink); border-bottom: 1px solid var(--line);
  }
  .search-results button:last-child { border-bottom: 0; }
  .search-results button:hover { background: var(--page); }
  .search-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .swatches { display: flex; gap: 7px; flex-wrap: wrap; }
  .swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--line-2); cursor: pointer; }
  .swatch.on { box-shadow: 0 0 0 2px var(--ink); }

  .modal-foot { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-top: 1px solid var(--line); background: var(--page); }
  .modal-foot .btn { background: var(--ink); color: #fff; border: 0; }
  .modal-foot .btn.ghost { background: transparent; color: var(--muted); }
  .modal-foot .btn.danger { background: transparent; color: var(--signal); }
  .modal-foot .btn:hover { filter: brightness(1.08); }

  .hidden-file { display: none; }
</style>
</head>

<script>

function id(){ return Math.random().toString(36).slice(2,9); }

const SAMPLE = {
  title: "La Subasta de un Alma — El Drama",
  days: [
    { id: id(), label: "Isabela", date: "2026-06-16", color: PALETTE[0],
      info: ["Lleven ropa para hospedarse", "Lleven polo ministerial"],
      stops: [
        { id: id(), name: "Three Brothers Guest House", time: "Hospedaje", lat: 18.4726, lng: -67.0156,
          notes: "Llegada y hospedaje. Three Brothers Restaurant, Isabela · 00662." },
      ]},
    { id: id(), label: "Mayagüez", date: "2026-06-17", color: PALETTE[1],
      info: ["Vestimenta: Polo Ministerial", "Almuerzo luego del compromiso", "Regreso a nuestros hogares"],
      stops: [
        { id: id(), name: "Centro de Detención de Mayagüez", time: "9:30 AM", lat: 18.2011, lng: -67.1257,
          notes: "Organizado por el Pastor Andy Gonzalez. Registro a la llegada." },
      ]},
    { id: id(), label: "Guayama", date: "2026-06-18", color: PALETTE[2],
      info: ["Lleven muda de ropa para hospedaje", "T-shirt para ponernos para la actividad de Ponce"],
      stops: [
        { id: id(), name: "Parque Ecuestre de Guayama", time: "7:00 PM", lat: 17.9685, lng: -66.1187,
          notes: "Invita: IDDPMI Puente de Jobos, Guayama. Plus Code XV9J+CG3 · 00784." },
        { id: id(), name: "Airbnb — Patillas (hospedaje)", time: "Hospedaje", lat: 17.9920, lng: -66.0327,
          notes: "Calle 9, Q13, Patillas · 00723. Pernoctar después del evento en Guayama." },
      ]},
    { id: id(), label: "Ponce", date: "2026-06-19", color: PALETTE[3],
      info: ["T-shirt para el evento", "Regreso a casa"],
      stops: [
        { id: id(), name: "Residencial López Nussa", time: "7:00 PM", lat: 17.9973, lng: -66.6091,
          notes: "Pastora Liliam Santos, invita IUJ, Ponce. Carr Puerto Rico 2, Ponce · 00717." },
      ]},
    { id: id(), label: "Naguabo", date: "2026-06-20", color: PALETTE[4],
      stops: [

      ]},
  ],
};

let trip = SAMPLE;
let map, layerGroup;
let activeStopId = null;

/* ---------- map ---------- */
function initMap(){
  map = L.map("map", { zoomControl: true }).setView([18.2, -66.4], 9);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors',
  }).addTo(map);
  layerGroup = L.layerGroup().addTo(map);
}

/* Pick readable text (dark or white) for a given marker color. */
function textOn(hex){
  const c = hex.replace('#','');
  const r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  return ((r*299 + g*587 + b*114) / 1000) > 135 ? '#141414' : '#ffffff';
}

/* Google Maps directions URL — opens the Maps app on phones (Android & iPhone). */
function dirUrl(lat, lng){
  return `https://www.google.com/maps/dir/?api=1&destination=${Number(lat)},${Number(lng)}`;
}

function pinIcon(color, n){
  return L.divIcon({
    className: "",
    html: `<div class="pin" style="background:${color}"><span style="color:${textOn(color)}">${n}</span></div>`,
    iconSize: [28,28], iconAnchor: [14,28], popupAnchor: [0,-26],
  });
}

/* Numbering organized by day: day index (1-based) + a letter only when
   that day has more than one located stop (e.g. 3a, 3b). Returns {stopId: label}. */
function dayStopLabels(day, di){
  const located = day.stops.filter(s => isFinite(s.lat) && isFinite(s.lng)).length;
  const multi = located > 1;
  const out = {}; let sub = 0;
  day.stops.forEach(s => {
    const has = isFinite(s.lat) && isFinite(s.lng);
    out[s.id] = (di + 1) + ((has && multi) ? String.fromCharCode(97 + sub) : "");
    if (has) sub++;
  });
  return out;
}

function drawMap(fit){
  layerGroup.clearLayers();
  const allPts = [];
  trip.days.forEach((day, di) => {
    const pts = [];
    const labels = dayStopLabels(day, di);
    day.stops.forEach((stop) => {
      if (!isFinite(stop.lat) || !isFinite(stop.lng)) return;
      const label = labels[stop.id];
      const ll = [Number(stop.lat), Number(stop.lng)];
      pts.push(ll); allPts.push(ll);
      const m = L.marker(ll, { icon: pinIcon(day.color, label) }).addTo(layerGroup);
      m.bindPopup(
        `<strong>${escapeHtml(stop.name||"Sin título")}</strong>` +
        (stop.time ? `<br><span style="font-family:monospace">${escapeHtml(stop.time)}</span>` : "") +
        (stop.notes ? `<br>${escapeHtml(stop.notes)}` : "") +
        `<br><a class="popup-dir" href="${dirUrl(stop.lat, stop.lng)}" target="_blank" rel="noopener">Cómo llegar →</a>`
      );
      m.on("click", () => setActive(stop.id, false));
      m._stopId = stop.id;
    });
    if (pts.length > 1) {
      L.polyline(pts, { color: day.color, weight: 4, opacity: .75, dashArray: "1 8", lineCap: "round" }).addTo(layerGroup);
    }
  });
  if (fit && allPts.length) {
    map.fitBounds(allPts, { padding: [50,50], maxZoom: 14 });
  } else if (fit && !allPts.length) {
    map.setView([18.2,-66.4], 9);
  }
}

function flyToStop(stop){
  if (!isFinite(stop.lat) || !isFinite(stop.lng)) return;
  map.flyTo([Number(stop.lat), Number(stop.lng)], Math.max(map.getZoom(), 14), { duration: .6 });
  layerGroup.eachLayer(l => { if (l._stopId === stop.id && l.openPopup) l.openPopup(); });
}

/* ---------- list (read-only) ---------- */
function drawRail(){
  const rail = document.getElementById("rail");
  rail.innerHTML = "";
  if (!trip.days.length){
    rail.innerHTML = `<div class="rail-empty">Sin información.</div>`;
  }
  trip.days.forEach((day, di) => {
    const el = document.createElement("section");
    el.className = "day";
    el.style.color = day.color;
    el.style.setProperty("--day-c", day.color);

    const labels = dayStopLabels(day, di);
    const stopsHtml = day.stops.map((s) => `
      <div class="stop ${s.id===activeStopId?'active':''}" data-stop="${s.id}" data-day="${day.id}">
        <div class="stop-node"><span style="color:${textOn(day.color)}">${labels[s.id]}</span></div>
        <div class="stop-top">
          ${s.time ? `<span class="stop-time">${escapeHtml(s.time)}</span>` : ""}
          <span class="stop-name">${escapeHtml(s.name||"Parada sin título")}</span>
        </div>
        ${s.notes ? `<div class="stop-notes">${escapeHtml(s.notes)}</div>` : ""}
        ${isFinite(s.lat)&&isFinite(s.lng)
          ? `<div class="stop-coord">${Number(s.lat).toFixed(4)}, ${Number(s.lng).toFixed(4)}</div>
             <a class="stop-dir" data-directions href="${dirUrl(s.lat, s.lng)}" target="_blank" rel="noopener">Cómo llegar →</a>`
          : `<div class="stop-coord" style="color:var(--signal)">sin ubicación</div>`}
      </div>`).join("");

    el.innerHTML = `
      <div class="day-head">
        <div class="day-dot"></div>
        <div class="day-meta">
          <div class="day-label">${escapeHtml(day.label||'Día')}</div>
          <div class="day-date">${day.date ? formatDate(day.date) : "sin fecha"}</div>
        </div>
      </div>
      ${day.info ? `<div class="day-info"><span class="day-info-tag">Nota</span>${
        Array.isArray(day.info)
          ? `<ul class="day-info-list">${day.info.map(it => `<li>${escapeHtml(it)}</li>`).join("")}</ul>`
          : escapeHtml(day.info)
      }</div>` : ""}
      <div class="stops">${stopsHtml}</div>`;
    rail.appendChild(el);
  });

  wireRail();
}

function setActive(stopId, scroll){
  activeStopId = stopId;
  drawRail();
  const stop = findStop(stopId)?.stop;
  if (stop) flyToStop(stop);
  if (scroll){
    const node = document.querySelector(`[data-stop="${stopId}"]`);
    if (node) node.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

function findStop(stopId){
  for (const day of trip.days){
    const s = day.stops.find(x => x.id === stopId);
    if (s) return { day, stop: s };
  }
  return null;
}

/* tapping a stop flies the map to it; the "Cómo llegar" link opens GPS */
function wireRail(){
  document.querySelectorAll(".stop").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.closest("[data-directions]")) return;
      setActive(el.dataset.stop, false);
    });
  });
}

/* ---------- map controls + mobile toggle ---------- */
document.getElementById("fitBtn").addEventListener("click", () => drawMap(true));

document.getElementById("vMap").addEventListener("click", () => setView("map"));
document.getElementById("vList").addEventListener("click", () => setView("list"));
function setView(v){
  document.body.dataset.view = v;
  document.getElementById("vMap").classList.toggle("on", v==="map");
  document.getElementById("vList").classList.toggle("on", v==="list");
  if (v==="map") setTimeout(()=>map.invalidateSize(), 50);
}

/* ---------- utils ---------- */
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function formatDate(d){
  try { return new Date(d+"T00:00").toLocaleDateString("es-PR",{weekday:"short",month:"short",day:"numeric"}); }
  catch(e){ return d; }
}

/* ---------- boot ---------- */
/* Carga el itinerario desde data.json si está disponible (p. ej. en GitHub Pages).
   Si no se puede (archivo local o vista previa), usa la copia incluida en SAMPLE. */
(async function boot(){
  try {
    const res = await fetch("data.json", { cache: "no-store" });
    if (res.ok) {
      const d = await res.json();
      if (d && Array.isArray(d.days)) trip = d;
    }
  } catch (e) { /* respaldo: copia incluida */ }
  document.title = trip.title || "La Subasta de un Alma";
  initMap();
  drawRail();
  drawMap(true);
})();

</script>
